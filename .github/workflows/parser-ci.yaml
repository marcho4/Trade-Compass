name: Parser CI

on:
  push:
    paths:
      - 'parser/**'
      - '.github/workflows/parser-ci.yaml'
  pull_request:
    paths:
      - 'parser/**'
      - '.github/workflows/parser-ci.yaml'

permissions:
  contents: read

concurrency:
  group: parser-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parser
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: parser/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m "not integration" -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: parser
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: parser/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build parser image
        uses: docker/build-push-action@v6
        with:
          context: ./parser
          tags: trade-compass-parser-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration tests
        run: pytest -m integration tests/integration/ -v
